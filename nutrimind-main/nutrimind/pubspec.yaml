name: nutrimind
description: NutriMind - Your Personal Editorial Food Sanctuary for Davao, Philippines
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.1.3

  # Google Sign In
  google_sign_in: ^6.2.1

  # State Management
  provider: ^6.1.2

  # UI Helpers
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  shared_preferences: ^2.3.1
  uuid: ^4.4.0
  shimmer: ^3.0.0
  http: ^1.2.2
  camera: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/recipes_nutrition_sample.json
